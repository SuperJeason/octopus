name: changelog

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  changelog:
    name: Create Release Notes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # 使用内置 token；不再依赖未配置的 ACTION_TOKEN
          token: ${{ github.token }}

      # 根据 commit 生成/更新 GitHub Release 说明（changelogithub）
      - name: Generate changelog
        run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ github.token }}
